name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Fetch photos from R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL: ${{ secrets.R2_PUBLIC_URL }}
        run: npm run build:photos

      - name: Build site
        run: npm run build:site

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # Tell the blog (yanatan16.github.io) to refresh its homepage album
      # covers. We send a compact summary (a few KB) as the dispatch payload,
      # so the blog never needs R2 access or this repo's gitignored photos.json.
      - name: Notify blog to sync albums
        if: github.ref == 'refs/heads/main'
        env:
          BLOG_DISPATCH_TOKEN: ${{ secrets.BLOG_DISPATCH_TOKEN }}
        run: |
          PAYLOAD=$(jq -c '{
            event_type: "photos-updated",
            client_payload: { albums: [ .albums[] | { id, name, count: (.photos | length), cover } ] }
          }' src/data/photos.json)
          curl -fsSL -X POST \
            -H "Authorization: Bearer $BLOG_DISPATCH_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/yanatan16/yanatan16.github.io/dispatches \
            -d "$PAYLOAD"
